apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bluegreen-multiroutes
  namespace: argo-cd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Himalayan-wildcat/argocd-test
    targetRevision: main
    path: manifests/argo-rollouts/bluegreen/multiroute
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  # Argo Rollouts dynamically injects `rollouts-pod-template-hash` into the
  # Service selector to route traffic to specific pods (active vs preview).
  # Without this, ArgoCD would show perpetual out-of-sync on the Services.
  ignoreDifferences:
    - group: ""
      kind: Service
      jsonPointers:
        - /spec/selector/rollouts-pod-template-hash
  syncPolicy:
    automated:
      prune: true
      # selfHeal is disabled to allow manual kubectl intervention
      # (e.g. abort, promote, undo) without ArgoCD immediately overwriting it.
      selfHeal: false
    syncOptions:
      # Use server-side apply for proper field ownership management.
      - ServerSideApply=true
      # Ensures ArgoCD does not overwrite the `rollouts-pod-template-hash`
      # selector during syncs. Without this, every Git push would temporarily
      # break active/preview traffic separation until Argo Rollouts re-injects
      # the hash. Works in tandem with ignoreDifferences above.
      - RespectIgnoreDifferences=true
