apiVersion: v1
kind: Service
metadata:
  name: bluegreen-active
spec:
  selector:
    app: bluegreen-rollouts
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: bluegreen-preview
spec:
  selector:
    app: bluegreen-rollouts
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: bluegreen-rollouts
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: bluegreen-rollouts
  template:
    metadata:
      labels:
        app: bluegreen-rollouts
    spec:
      containers:
        - name: bluegreen-rollouts
          image: rollouts-demo:blue
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              protocol: TCP
  strategy:
    blueGreen:
      activeService: bluegreen-active
      previewService: bluegreen-preview
      autoPromotionEnabled: false
      scaleDownDelaySeconds: 86400 # 1 day
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bluegreen-active
spec:
  parentRefs:
    - name: cilium-gateway
      namespace: kube-system
  hostnames:
    - bluegreen-multiroutes.localhost
  rules:
    - backendRefs:
        - name: bluegreen-active
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bluegreen-preview
spec:
  parentRefs:
    - name: cilium-gateway
      namespace: kube-system
  hostnames:
    - bluegreen-multiroutes-preview.localhost
  rules:
    - backendRefs:
        - name: bluegreen-preview
          port: 80
