apiVersion: v1
kind: Service
metadata:
  name: bluegreen-singleroute-active
spec:
  selector:
    app: bluegreen-singleroute-rollouts
  ports:
    - port: 80
      targetPort: 8080
  sessionAffinity: None
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: bluegreen-singleroute-preview
spec:
  selector:
    app: bluegreen-singleroute-rollouts
  ports:
    - port: 80
      targetPort: 8080
  sessionAffinity: None
  type: ClusterIP
---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: bluegreen-singleroute-rollout
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: bluegreen-singleroute-rollouts
  template:
    metadata:
      labels:
        app: bluegreen-singleroute-rollouts
    spec:
      containers:
        - name: bluegreen-singleroute-rollouts
          image: rollouts-demo:blue
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              protocol: TCP
  strategy:
    blueGreen:
      activeService: bluegreen-singleroute-active
      previewService: bluegreen-singleroute-preview
      autoPromotionEnabled: false
      # NOTE:
      # When enabled, Argo Rollouts treats re-deployment of a version still within
      # the delay window as a warm rollback and skips the preview pause, making it
      # impossible to test autoPromotionEnabled: false behavior properly.
      scaleDownDelaySeconds: 86400
      scaleDownDelayRevisionLimit: 1
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bluegreen-singleroute
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: cilium-gateway
      namespace: default
  hostnames:
    - bluegreen-singleroute.localhost
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /preview
      Backendrefs:
        - group: ""
          kind: Service
          name: bluegreen-singleroute-preview
          port: 80
          weight: 1
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: bluegreen-singleroute-active
          port: 80
          weight: 1
