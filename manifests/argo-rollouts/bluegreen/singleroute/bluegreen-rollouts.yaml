apiVersion: v1
kind: Service
metadata:
  name: bluegreen-singleroute-active
spec:
  selector:
    app: bluegreen-singleroute-rollout
  ports:
    - port: 80
      targetPort: 8080
  sessionAffinity: None
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: bluegreen-singleroute-preview
spec:
  selector:
    app: bluegreen-singleroute-rollout
  ports:
    - port: 80
      targetPort: 8080
  sessionAffinity: None
  type: ClusterIP
---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: bluegreen-singleroute-rollout
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: bluegreen-singleroute-rollout
  template:
    metadata:
      labels:
        app: bluegreen-singleroute-rollout
    spec:
      containers:
        - name: bluegreen-singleroute-rollout
          image: rollouts-demo:green
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              protocol: TCP
  strategy:
    blueGreen:
      activeService: bluegreen-singleroute-active
      previewService: bluegreen-singleroute-preview
      autoPromotionEnabled: false
      # NOTE:
      # When enabled, Argo Rollouts treats re-deployment of a version still within
      # the delay window as a warm rollback and skips the preview pause, making it
      # impossible to test autoPromotionEnabled: false behavior properly.
      scaleDownDelaySeconds: 86400
      scaleDownDelayRevisionLimit: 1
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bluegreen-singleroute
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: cilium-gateway
      namespace: default
  hostnames:
    - bluegreen-singleroute.localhost
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /preview
      filters:
        # Rewrite /preview → / before forwarding to the preview pod.
        # Required because the application does not serve a /preview route —
        # without this, the gateway forwards the path as-is and the app returns 404.
        #
        # NOTE: this is NOT recommended for real-world API use. The path rewrite
        # introduces invisible indirection: the app receives / but the client sent
        # /preview. This causes issues with relative redirects, self-referencing
        # URLs in responses, and confusing logs/traces. For production APIs,
        # use Pattern 2 (multiroute) with a dedicated preview hostname instead.
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - group: ""
          kind: Service
          name: bluegreen-singleroute-preview
          port: 80
          weight: 1
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: bluegreen-singleroute-active
          port: 80
          weight: 1
