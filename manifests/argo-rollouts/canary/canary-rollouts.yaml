apiVersion: v1
kind: Service
metadata:
  name: canary-rollouts
spec:
  selector:
    app: canary-rollouts
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: canary-rollouts
spec:
  replicas: 5
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: canary-rollouts
  template:
    metadata:
      labels:
        app: canary-rollouts
    spec:
      containers:
        - name: canary-rollouts
          image: rollouts-demo:blue
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              protocol: TCP
  strategy:
    canary:
      scaleDownDelaySeconds: 86400 # 1 day
      steps:
        - setWeight: 10
        - pause: {}
        - setWeight: 25
        - pause: {}
        - setWeight: 50
        - pause: {}
        - setWeight: 75
        - pause: {}
